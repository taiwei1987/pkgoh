name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: pkgoh-x86_64-apple-darwin.tar.gz
          - runner: macos-15
            target: aarch64-apple-darwin
            archive: pkgoh-aarch64-apple-darwin.tar.gz

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin pkgoh --bin pkg

      - name: Package artifacts
        run: |
          mkdir -p dist/pkgoh
          cp target/${{ matrix.target }}/release/pkgoh dist/pkgoh/
          cp target/${{ matrix.target }}/release/pkg dist/pkgoh/
          cp README.md dist/pkgoh/
          cp README.zh-CN.md dist/pkgoh/
          cp LICENSE dist/pkgoh/
          cp CONTRIBUTING.md dist/pkgoh/
          cp pkgoh.example.toml dist/pkgoh/
          tar -C dist -czf ${{ matrix.archive }} pkgoh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
